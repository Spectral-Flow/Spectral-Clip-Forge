name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_ENV: test
  CI: true

jobs:
  # Job 1: Lint
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Setup Python
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Node.js dependencies
        if: hashFiles('package.json') != ''
        run: npm ci
      
      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pylint mypy
      
      - name: Install Python dependencies (Poetry)
        if: hashFiles('pyproject.toml', 'poetry.lock') != ''
        run: |
          python -m pip install --upgrade pip poetry
          poetry install --no-interaction
      
      - name: Lint JavaScript/TypeScript (ESLint)
        if: hashFiles('package.json') != ''
        run: |
          if npm run lint --if-present; then
            echo "Linting passed"
          else
            echo "Linting step skipped or failed"
          fi
        continue-on-error: false
      
      - name: Lint Python (Black)
        if: hashFiles('**/*.py') != ''
        run: |
          if command -v black &> /dev/null; then
            black --check . || echo "Black check completed with issues"
          else
            echo "Black not available, skipping"
          fi
        continue-on-error: true
      
      - name: Lint Python (Flake8)
        if: hashFiles('**/*.py') != ''
        run: |
          if command -v flake8 &> /dev/null; then
            flake8 . --max-line-length=88 --extend-ignore=E203,W503 || echo "Flake8 found issues"
          else
            echo "Flake8 not available, skipping"
          fi
        continue-on-error: true
      
      - name: Check YAML files
        run: |
          if command -v yamllint &> /dev/null; then
            yamllint .github/ || echo "YAML check completed"
          else
            echo "yamllint not installed, checking basic syntax"
            for file in $(find .github -name "*.yml" -o -name "*.yaml"); do
              python -c "import yaml; yaml.safe_load(open('$file'))" || echo "Issue with $file"
            done
          fi
        continue-on-error: true

  # Job 2: Test
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ['18', '20']
        python-version: ['3.9', '3.11']
        exclude:
          # Reduce matrix size - only test all combinations on ubuntu
          - os: macos-latest
            node-version: '18'
          - os: macos-latest
            python-version: '3.9'
          - os: windows-latest
            node-version: '18'
          - os: windows-latest
            python-version: '3.9'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Setup Python ${{ matrix.python-version }}
        if: hashFiles('requirements.txt', 'pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install Node.js dependencies
        if: hashFiles('package.json') != ''
        run: npm ci
      
      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Install Python dependencies (Poetry)
        if: hashFiles('pyproject.toml', 'poetry.lock') != ''
        run: |
          python -m pip install --upgrade pip poetry
          poetry install --no-interaction
      
      - name: Run Node.js tests
        if: hashFiles('package.json') != ''
        run: npm test --if-present
        timeout-minutes: 10
      
      - name: Run Python tests (pytest)
        if: hashFiles('**/*.py') != ''
        run: |
          if command -v pytest &> /dev/null; then
            pytest --cov --cov-report=xml --cov-report=term || echo "No tests found or tests failed"
          else
            echo "pytest not available, skipping"
          fi
        timeout-minutes: 10
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml,./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  # Job 3: Build
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Setup Python
        if: hashFiles('requirements.txt', 'pyproject.toml', 'setup.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Node.js dependencies
        if: hashFiles('package.json') != ''
        run: npm ci
      
      - name: Install Python dependencies
        if: hashFiles('requirements.txt') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install build wheel
      
      - name: Install Python dependencies (Poetry)
        if: hashFiles('pyproject.toml', 'poetry.lock') != ''
        run: |
          python -m pip install --upgrade pip poetry
          poetry install --no-interaction
      
      - name: Build Node.js project
        if: hashFiles('package.json') != ''
        run: npm run build --if-present
        timeout-minutes: 10
      
      - name: Build Python package
        if: hashFiles('setup.py', 'pyproject.toml') != ''
        run: |
          if [ -f "setup.py" ]; then
            python setup.py build || echo "Build step completed"
          elif [ -f "pyproject.toml" ] && command -v poetry &> /dev/null; then
            poetry build || echo "Poetry build completed"
          else
            echo "No Python build configuration found"
          fi
        timeout-minutes: 10
        continue-on-error: true
      
      - name: Upload build artifacts
        if: hashFiles('dist/**/*', 'build/**/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
          retention-days: 7
        continue-on-error: true

  # Job 4: Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Run npm audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high || echo "npm audit found issues"
        continue-on-error: true
      
      - name: Run pip audit
        if: hashFiles('requirements.txt') != ''
        run: |
          pip install pip-audit || true
          pip-audit || echo "pip-audit found issues or not available"
        continue-on-error: true

  # Job 5: Documentation Check
  docs:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for README
        run: |
          if [ ! -f "README.md" ]; then
            echo "::warning::README.md not found"
            exit 1
          fi
      
      - name: Check for LICENSE
        run: |
          if [ ! -f "LICENSE" ] && [ ! -f "LICENSE.md" ] && [ ! -f "LICENSE.txt" ]; then
            echo "::warning::LICENSE file not found"
          fi
        continue-on-error: true
      
      - name: Check for CONTRIBUTING guide
        run: |
          if [ ! -f "CONTRIBUTING.md" ] && [ ! -f ".github/CONTRIBUTING.md" ]; then
            echo "::notice::CONTRIBUTING.md not found (optional)"
          fi
        continue-on-error: true
      
      - name: Validate Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check.json'
        continue-on-error: true

  # Job 6: Agent Environment Test
  agent-environment:
    name: Test Agent Environment Setup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate copilot-setup-steps.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('.github/copilot-setup-steps.yaml'))"
          echo "copilot-setup-steps.yaml is valid YAML"
      
      - name: Validate copilot-instructions.md exists
        run: |
          if [ ! -f ".github/copilot-instructions.md" ]; then
            echo "::error::.github/copilot-instructions.md not found"
            exit 1
          fi
          echo "copilot-instructions.md found"
      
      - name: Check GitHub templates
        run: |
          if [ -d ".github/ISSUE_TEMPLATE" ]; then
            echo "Issue templates found"
          else
            echo "::warning::No issue templates"
          fi
          
          if [ -f ".github/PULL_REQUEST_TEMPLATE.md" ] || [ -d ".github/PULL_REQUEST_TEMPLATE" ]; then
            echo "PR template found"
          else
            echo "::warning::No PR template"
          fi

  # Final status check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, docs, agent-environment]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::Lint job failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::warning::Test job failed"
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::warning::Build job failed"
          fi
          if [ "${{ needs.agent-environment.result }}" != "success" ]; then
            echo "::error::Agent environment check failed"
            exit 1
          fi
          echo "CI completed successfully"
