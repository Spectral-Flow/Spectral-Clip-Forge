name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '16.x'
  
jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          
      - name: Run Black formatter check
        run: |
          if [ -d backend ]; then
            black backend/ --check --line-length 100
          else
            echo "Backend directory not found, skipping Black check"
          fi
          
      - name: Run Flake8 linter
        run: |
          if [ -d backend ]; then
            flake8 backend/ --max-line-length=100 --extend-ignore=E203,W503
          else
            echo "Backend directory not found, skipping Flake8 check"
          fi
          
      - name: Run MyPy type checker
        run: |
          if [ -d backend ]; then
            mypy backend/ --ignore-missing-imports || true
          else
            echo "Backend directory not found, skipping MyPy check"
          fi

  lint-frontend:
    name: Lint Frontend Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci
          else
            echo "Frontend package.json not found, skipping"
          fi
          
      - name: Run ESLint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run lint || echo "Lint script not found"
          else
            echo "Frontend not found, skipping ESLint"
          fi
          
      - name: Run Prettier check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run format:check || npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,md}" || echo "Format check not available"
          else
            echo "Frontend not found, skipping Prettier"
          fi

  test-python:
    name: Test Python Code
    runs-on: ubuntu-latest
    needs: lint-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: '**/requirements*.txt'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          
      - name: Run unit tests
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing
          else
            echo "No tests found, skipping"
          fi
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  test-frontend:
    name: Test Frontend Code
    runs-on: ubuntu-latest
    needs: lint-frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci
          else
            echo "Frontend package.json not found, skipping"
          fi
          
      - name: Run unit tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm test -- --coverage || echo "Tests not available"
          else
            echo "Frontend not found, skipping tests"
          fi
          
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit
          
      - name: Run Python security audit
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
            pip-audit || true
            safety check || true
          else
            echo "No requirements.txt found, skipping Python security scan"
          fi
          
      - name: Run npm audit
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm audit --production || true
          else
            echo "No package.json found, skipping npm audit"
          fi

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test-python, security-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          
      - name: Build package
        run: |
          if [ -f backend/setup.py ]; then
            cd backend && python setup.py sdist bdist_wheel
          else
            echo "No setup.py found, skipping build"
          fi
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        run: |
          if [ -f docker/backend.Dockerfile ]; then
            docker build -t spectral-clip-forge-backend:${{ github.sha }} -f docker/backend.Dockerfile .
          elif [ -f Dockerfile ]; then
            docker build -t spectral-clip-forge-backend:${{ github.sha }} .
          else
            echo "No Dockerfile found, skipping Docker build"
          fi

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend, security-scan]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
          
      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci
          else
            echo "Frontend package.json not found, skipping"
          fi
          
      - name: Build frontend
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run build
          else
            echo "Frontend not found, skipping build"
          fi
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
        continue-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f backend/requirements-dev.txt ]; then pip install -r backend/requirements-dev.txt; fi
          
      - name: Run integration tests
        run: |
          if [ -d backend/tests/integration ]; then
            pytest backend/tests/integration/ -v
          else
            echo "No integration tests found, skipping"
          fi

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci
          else
            echo "Frontend package.json not found, skipping"
          fi
          
      - name: Install Playwright browsers
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npx playwright install --with-deps || echo "Playwright not configured"
          fi
          
      - name: Run E2E tests
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run test:e2e || echo "E2E tests not available"
          else
            echo "Frontend not found, skipping E2E tests"
          fi

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.spectral-clip-forge.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
          # Example: docker-compose -f docker-compose.staging.yml up -d
          echo "Staging deployment would happen here"
          
      - name: Run health check
        run: |
          echo "Running health check on staging..."
          # Add health check commands here
          # Example: curl -f https://staging.spectral-clip-forge.com/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://spectral-clip-forge.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
          # Example: docker-compose -f docker-compose.prod.yml up -d
          echo "Production deployment would happen here (requires manual approval)"
          
      - name: Run health check
        run: |
          echo "Running health check on production..."
          # Add health check commands here
          # Example: curl -f https://spectral-clip-forge.com/health || exit 1
          
      - name: Notify deployment
        run: |
          echo "Notifying team of successful deployment..."
          # Add notification commands here (Slack, Discord, email, etc.)
